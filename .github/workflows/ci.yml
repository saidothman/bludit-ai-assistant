name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # matrix strategy allows testing across multiple PHP environments
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json
          coverage: none # Changed to none unless you explicitly require xdebug coverage reports

      - name: Cache Composer packages
        uses: actions/cache@v4 # Updated to v4 for better performance and Node.js runtime support
        with:
          path: ~/.composer/cache # Best practice path for caching Composer's global cache rather than vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # If you have a custom phpunit.xml or test suite configured via composer, this runs it.
      # If you don't have tests set up yet, you can comment this line out until you do.
      - name: Run tests
        run: composer test --if-exists

      - name: Check PHP syntax (Lint)
        run: |
          # We search the current workspace folder (.) for PHP files instead of a hardcoded 'bl-plugins' directory.
          # Using -exec instead of piping to grep ensures that any actual syntax error natively breaks the build.
          find . -type f -name "*.php" ! -path "./vendor/*" -exec php -l {} \;
